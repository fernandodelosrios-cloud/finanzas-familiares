<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Finanzas Familiares</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f9fafb;
            color: #1f2937;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }
        
        .header {
            margin-bottom: 2rem;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        
        .header-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 0.5px solid #e5e7eb;
        }
        
        .tab-btn {
            padding: 0.75rem 1rem;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            color: #9ca3af;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            color: #1f2937;
            border-bottom-color: #1f2937;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-section {
            background: white;
            border: 0.5px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #1f2937;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 0.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .radio-group {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0;
            font-weight: 400;
        }
        
        .button {
            padding: 0.75rem 1.5rem;
            background: #f3f4f6;
            border: 0.5px solid #d1d5db;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .button:hover {
            background: #e5e7eb;
        }
        
        .button.primary {
            background: #1f2937;
            color: white;
            border-color: #1f2937;
        }
        
        .button.primary:hover {
            opacity: 0.9;
        }
        
        .button.secondary {
            background: #f3f4f6;
            border: 0.5px solid #d1d5db;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }
        
        .dashboard-card {
            background: white;
            border: 0.5px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.5rem;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 1rem;
        }
        
        .budget-section {
            margin-bottom: 2rem;
        }
        
        .budget-item {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
            align-items: center;
            padding: 0.75rem;
            background: #f9fafb;
            border-radius: 8px;
        }
        
        .budget-item-name {
            font-size: 14px;
            font-weight: 500;
        }
        
        .budget-progress {
            position: relative;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .budget-progress-bar {
            height: 100%;
            background: #1f2937;
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .budget-stats {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #6b7280;
        }
        
        .stat-card {
            background: #f9fafb;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 500;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .expense-list {
            margin-top: 1rem;
        }
        
        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 0.5px solid #e5e7eb;
            font-size: 14px;
        }
        
        .expense-item:last-child {
            border-bottom: none;
        }
        
        .expense-info {
            flex: 1;
        }
        
        .expense-category {
            font-size: 13px;
            color: #6b7280;
        }
        
        .expense-amount {
            font-weight: 500;
        }
        
        .expense-badge {
            display: inline-block;
            font-size: 11px;
            padding: 0.25rem 0.5rem;
            background: #f3f4f6;
            border-radius: 3px;
            margin-left: 0.5rem;
        }
        
        .success-msg {
            display: none;
            padding: 1rem;
            background: #dcfce7;
            border: 0.5px solid #86efac;
            border-radius: 8px;
            color: #166534;
            margin-bottom: 1rem;
        }
        
        .success-msg.active {
            display: block;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .budget-item {
                grid-template-columns: 1fr;
            }
            
            .header-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Gestor de Finanzas Familiares</h1>
            <p style="color: #6b7280; font-size: 14px; margin: 0;">Abril 2026</p>
            <div class="header-actions">
                <button class="button secondary" onclick="exportToCSV()">📥 Descargar CSV</button>
                <button class="button secondary" onclick="exportToGoogleSheets()">📊 Exportar a Google Sheets</button>
            </div>
        </div>
        
        <div class="success-msg" id="successMsg"></div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('expenses')">Registrar Gasto</button>
            <button class="tab-btn" onclick="switchTab('dashboard')">Dashboard</button>
            <button class="tab-btn" onclick="switchTab('budgets')">Presupuestos</button>
        </div>
        
        <!-- TAB: REGISTRAR GASTO -->
        <div id="expenses" class="tab-content active">
            <div class="form-section">
                <h2 style="font-size: 18px; font-weight: 500; margin-bottom: 1.5rem;">Nuevo Gasto</h2>
                
                <form id="expenseForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Responsable *</label>
                            <select id="responsible" required>
                                <option value="">Selecciona</option>
                                <option value="Anto">Anto</option>
                                <option value="Fer">Fer</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Categoría *</label>
                            <select id="category" required onchange="updateSubcategories()">
                                <option value="">Selecciona</option>
                                <option value="Gastos fijos">Gastos fijos</option>
                                <option value="Gastos variables">Gastos variables</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Subcategoría *</label>
                        <select id="subcategory" required>
                            <option value="">Selecciona una categoría primero</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea id="description" placeholder="Ej: Mercado en Carrefour"></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Monto ($) *</label>
                            <input type="number" id="amount" required min="0" step="0.01" placeholder="0.00">
                        </div>
                        
                        <div class="form-group">
                            <label>Medio de pago *</label>
                            <select id="paymentMethod" required>
                                <option value="">Selecciona</option>
                                <option value="Tarjeta de crédito">Tarjeta de crédito</option>
                                <option value="Bizum/Transferencia">Bizum/Transferencia</option>
                                <option value="Efectivo">Efectivo</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>¿Gasto compartido? *</label>
                        <div class="radio-group">
                            <label><input type="radio" name="isShared" value="Si" onchange="updateParticipation()"> Sí</label>
                            <label><input type="radio" name="isShared" value="No" onchange="updateParticipation()"> No</label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Participación *</label>
                        <div class="radio-group" id="participationGroup">
                            <p style="color: #6b7280; font-size: 13px;">Selecciona si es compartido primero</p>
                        </div>
                    </div>
                    
                    <button type="submit" class="button primary" style="width: 100%; margin-top: 1rem;">Registrar Gasto</button>
                </form>
            </div>
            
            <div class="form-section">
                <h3 style="font-size: 16px; font-weight: 500; margin-bottom: 1rem;">Últimos gastos registrados</h3>
                <div id="recentExpenses" class="expense-list"></div>
            </div>
        </div>
        
        <!-- TAB: DASHBOARD -->
        <div id="dashboard" class="tab-content">
            <div class="dashboard">
                <div class="dashboard-card">
                    <div class="card-title">Resumen General</div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Total Gastado</div>
                            <div class="stat-value" id="totalSpent">$0.00</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Presupuesto Total</div>
                            <div class="stat-value" id="totalBudget">$0.00</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Disponible</div>
                            <div class="stat-value" id="remaining">$0.00</div>
                        </div>
                    </div>
                </div>
                
                <div class="dashboard-card">
                    <div class="card-title">Gastos Compartidos</div>
                    <div id="sharedBudget" class="budget-section"></div>
                </div>
                
                <div class="dashboard-card">
                    <div class="card-title">Gastos de Anto</div>
                    <div id="antoBudget" class="budget-section"></div>
                </div>
                
                <div class="dashboard-card">
                    <div class="card-title">Gastos de Fer</div>
                    <div id="ferBudget" class="budget-section"></div>
                </div>
            </div>
        </div>
        
        <!-- TAB: PRESUPUESTOS -->
        <div id="budgets" class="tab-content">
            <div class="form-section">
                <h2 style="font-size: 18px; font-weight: 500; margin-bottom: 1.5rem;">Editar Presupuestos</h2>
                
                <div id="budgetEdits"></div>
                
                <button class="button primary" style="width: 100%; margin-top: 1rem;" onclick="saveBudgets()">Guardar Presupuestos</button>
            </div>
        </div>
    </div>
    
    <script>
        // Categorización
        const categories = {
            'Gastos fijos': ['Agua', 'Alquiler', 'Atlas y Ares', 'Equipamiento casa', 'Luz', 'Limpieza', 'Internet + Celulares', 'Gas'],
            'Gastos variables': ['Deporte', 'Peluquería', 'Psicólogo', 'Ropa', 'Salud', 'Social', 'Streaming / Suscripciones', 'Transporte público', 'Varios', 'Supermercado', 'Taxis', 'Viajes']
        };
        
        const sharedCategories = ['Agua', 'Alquiler', 'Atlas y Ares', 'Equipamiento casa', 'Luz', 'Viajes', 'Taxis', 'Supermercado', 'Limpieza', 'Internet + Celulares', 'Gas'];
        
        // Estado
        let expenses = [];
        let budgets = {
            'Agua': 50,
            'Alquiler': 1500,
            'Atlas y Ares': 200,
            'Equipamiento casa': 100,
            'Luz': 80,
            'Viajes': 300,
            'Taxis': 150,
            'Supermercado': 400,
            'Limpieza': 100,
            'Internet + Celulares': 80,
            'Gas': 50,
            'Deporte': 200,
            'Peluquería': 80,
            'Psicólogo': 120,
            'Ropa': 200,
            'Salud': 150,
            'Social': 250,
            'Streaming / Suscripciones': 50,
            'Transporte público': 100,
            'Varios': 100
        };
        
        // Inicializar
        function init() {
            loadFromStorage();
            renderBudgetEdits();
            updateDashboard();
        }
        
        // Storage
        function loadFromStorage() {
            const stored = localStorage.getItem('finanzasData');
            if (stored) {
                const data = JSON.parse(stored);
                expenses = data.expenses || [];
                budgets = data.budgets || budgets;
            }
        }
        
        function saveToStorage() {
            localStorage.setItem('finanzasData', JSON.stringify({ expenses, budgets }));
        }
        
        // Actualizar subcategorías
        function updateSubcategories() {
            const category = document.getElementById('category').value;
            const subcatSelect = document.getElementById('subcategory');
            subcatSelect.innerHTML = '<option value="">Selecciona</option>';
            
            if (category && categories[category]) {
                categories[category].forEach(sub => {
                    const option = document.createElement('option');
                    option.value = sub;
                    option.textContent = sub;
                    subcatSelect.appendChild(option);
                });
            }
        }
        
        // Actualizar participación
        function updateParticipation() {
            const isShared = document.querySelector('input[name="isShared"]:checked')?.value;
            const group = document.getElementById('participationGroup');
            
            group.innerHTML = '';
            if (isShared === 'Si') {
                group.innerHTML = `
                    <label><input type="radio" name="participation" value="50-50" checked> 50-50</label>
                    <label><input type="radio" name="participation" value="Anto 100%"> Anto 100%</label>
                    <label><input type="radio" name="participation" value="Fer 100%"> Fer 100%</label>
                `;
            } else if (isShared === 'No') {
                group.innerHTML = `
                    <label><input type="radio" name="participation" value="Anto 100%" checked> Anto 100%</label>
                    <label><input type="radio" name="participation" value="Fer 100%"> Fer 100%</label>
                `;
            }
        }
        
        // Registrar gasto
        document.getElementById('expenseForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const expense = {
                id: Date.now(),
                responsible: document.getElementById('responsible').value,
                category: document.getElementById('category').value,
                subcategory: document.getElementById('subcategory').value,
                description: document.getElementById('description').value,
                amount: parseFloat(document.getElementById('amount').value),
                paymentMethod: document.getElementById('paymentMethod').value,
                isShared: document.querySelector('input[name="isShared"]:checked')?.value,
                participation: document.querySelector('input[name="participation"]:checked')?.value,
                date: new Date().toLocaleDateString('es-ES')
            };
            
            expenses.push(expense);
            saveToStorage();
            
            document.getElementById('expenseForm').reset();
            updateDashboard();
            renderRecentExpenses();
            
            showSuccess('Gasto registrado correctamente');
        });
        
        // Renderizar gastos recientes
        function renderRecentExpenses() {
            const recent = expenses.slice(-5).reverse();
            const container = document.getElementById('recentExpenses');
            
            if (recent.length === 0) {
                container.innerHTML = '<p style="color: #6b7280; font-size: 14px;">No hay gastos registrados aún</p>';
                return;
            }
            
            container.innerHTML = recent.map(exp => `
                <div class="expense-item">
                    <div class="expense-info">
                        <div><strong>${exp.subcategory}</strong></div>
                        <div class="expense-category">${exp.responsible} • ${exp.date}</div>
                    </div>
                    <div>
                        <span class="expense-amount">$${exp.amount.toFixed(2)}</span>
                        <span class="expense-badge">${exp.participation}</span>
                    </div>
                </div>
            `).join('');
        }
        
        // Dashboard
        function updateDashboard() {
            const totalSpent = expenses.reduce((sum, e) => sum + e.amount, 0);
            const totalBudget = Object.values(budgets).reduce((sum, b) => sum + b, 0);
            const remaining = totalBudget - totalSpent;
            
            document.getElementById('totalSpent').textContent = '$' + totalSpent.toFixed(2);
            document.getElementById('totalBudget').textContent = '$' + totalBudget.toFixed(2);
            document.getElementById('remaining').textContent = '$' + remaining.toFixed(2);
            
            renderBudgetSection('sharedBudget', 'Compartido');
            renderBudgetSection('antoBudget', 'Anto');
            renderBudgetSection('ferBudget', 'Fer');
            
            renderRecentExpenses();
        }
        
        function renderBudgetSection(elementId, person) {
            const container = document.getElementById(elementId);
            let html = '';
            
            for (const [subcat, budget] of Object.entries(budgets)) {
                let isRelevant = false;
                if (person === 'Compartido') {
                    isRelevant = sharedCategories.includes(subcat);
                } else {
                    isRelevant = !sharedCategories.includes(subcat);
                }
                
                if (!isRelevant) continue;
                
                let spent = 0;
                expenses.forEach(exp => {
                    if (exp.subcategory !== subcat) return;
                    
                    if (person === 'Compartido') {
                        if (exp.isShared === 'Si') {
                            spent += exp.participation === '50-50' ? exp.amount / 2 : (exp.participation.includes(person) ? exp.amount : 0);
                        }
                    } else {
                        if (exp.isShared === 'No' && exp.responsible === person) {
                            spent += exp.amount;
                        } else if (exp.isShared === 'Si' && exp.participation.includes(person)) {
                            spent += exp.participation === '50-50' ? exp.amount / 2 : exp.amount;
                        }
                    }
                });
                
                const percentage = Math.min((spent / budget) * 100, 100);
                const remaining = budget - spent;
                
                html += `
                    <div class="budget-item">
                        <div class="budget-item-name">${subcat}</div>
                        <div class="budget-progress">
                            <div class="budget-progress-bar" style="width: ${percentage}%"></div>
                        </div>
                        <div class="budget-stats">
                            <span>$${spent.toFixed(2)} / $${budget.toFixed(2)}</span>
                            <span>${Math.max(0, remaining).toFixed(2)} disponible</span>
                        </div>
                    </div>
                `;
            }
            
            container.innerHTML = html || '<p style="color: #6b7280;">Sin presupuestos configurados</p>';
        }
        
        // Editar presupuestos
        function renderBudgetEdits() {
            const container = document.getElementById('budgetEdits');
            let html = '';
            
            for (const [subcat, budget] of Object.entries(budgets)) {
                html += `
                    <div class="form-group">
                        <label>${subcat}</label>
                        <input type="number" class="budget-input" data-subcat="${subcat}" value="${budget}" min="0" step="0.01">
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        function saveBudgets() {
            document.querySelectorAll('.budget-input').forEach(input => {
                const subcat = input.dataset.subcat;
                budgets[subcat] = parseFloat(input.value) || 0;
            });
            saveToStorage();
            updateDashboard();
            showSuccess('Presupuestos actualizados');
        }
        
        // Exportar a CSV
        function exportToCSV() {
            const headers = ['Fecha', 'Responsable', 'Categoría', 'Subcategoría', 'Descripción', 'Monto', '¿Compartido?', 'Participación', 'Medio de pago'];
            const rows = expenses.map(exp => [
                exp.date,
                exp.responsible,
                exp.category,
                exp.subcategory,
                exp.description,
                exp.amount.toFixed(2),
                exp.isShared,
                exp.participation,
                exp.paymentMethod
            ]);
            
            let csv = headers.join(',') + '\n';
            rows.forEach(row => {
                csv += row.map(cell => `"${cell}"`).join(',') + '\n';
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gastos-familiares-${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
            
            showSuccess('CSV descargado correctamente');
        }
        
        // Exportar a Google Sheets
        function exportToGoogleSheets() {
            const sheetUrl = 'https://docs.google.com/spreadsheets/d/1n5R6mcFc5kmiYTHIQ3SyA1HyhTJLUlvaF1Z5co7pwOA/edit?usp=sharing';
            
            const instructions = `
📋 Pasos para copiar los datos a Google Sheets:

1. Descarga el CSV con el botón "Descargar CSV"
2. Abre tu Google Sheets: 
   ${sheetUrl}

3. Crea una hoja nueva llamada "Gastos" (si no existe)

4. En la hoja "Gastos", haz clic en "Archivo" > "Importar" > "Subir archivo"

5. Selecciona el CSV descargado

6. Elige "Reemplazar hoja" o "Insertar nuevas filas"

7. ¡Listo! Tus datos están sincronizados

Puedes repetir este proceso cada vez que quieras actualizar el Sheets.
            `;
            
            alert(instructions);
            showSuccess('Instrucciones mostradas. Primero descarga el CSV.');
        }
        
        function showSuccess(msg) {
            const successDiv = document.getElementById('successMsg');
            successDiv.textContent = '✓ ' + msg;
            successDiv.classList.add('active');
            setTimeout(() => successDiv.classList.remove('active'), 3000);
        }
        
        // Cambiar tab
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }
        
        // Iniciar
        init();
    </script>
</body>
</html>
